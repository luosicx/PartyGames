# SonarQube Community Edition — PartyGames
# Usage: ./scripts/sonar.sh
# Docs:  https://docs.sonarsource.com/sonarqube-community-build/

# ---- Required ----
sonar.projectKey=com.partygames.app
sonar.projectName=PartyGames
sonar.projectVersion=1.0

# ---- Sources ----
sonar.sources=PartyGames
sonar.sourceEncoding=UTF-8
sonar.language=swift

# ---- Exclusions ----
sonar.exclusions=PartyGames.xcodeproj/**,**/*.generated.swift

# ---- Coverage Report (generated by scripts/sonar.sh) ----
sonar.swift.coverage.reportPaths=coverage/sonarqube-coverage.xml

# ---- SwiftLint Report (generated by scripts/sonar.sh) ----
sonar.swift.swiftlint.reportPaths=swiftlint-report.json

# ---- Test Execution Report ----
sonar.swift.testExecutionReportPaths=coverage/sonarqube-test-execution.xml

# ---- File Suffixes ----
sonar.swift.file.suffixes=.swift

# ---- Exclude test/auto-generated patterns ----
sonar.coverage.exclusions=**/*.generated.swift
