name: PartyGames
options:
  bundleIdPrefix: com.partygames
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    INFOPLIST_FILE: PartyGames/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.partygames.app

targets:
  PartyGames:
    type: application
    platform: iOS
    sources:
      - path: PartyGames
    settings:
      base:
        INFOPLIST_FILE: PartyGames/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.partygames.app
        DEVELOPMENT_TEAM: ""
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: ""
    preBuildScripts:
      - name: "SwiftLint"
        script: |
          if which swiftlint > /dev/null; then
            swiftlint lint --quiet
          else
            echo "warning: SwiftLint not installed, skipping"
          fi
        basedOnDependencyAnalysis: false
        inputFiles: []
        outputFiles: []

  PartyGamesUnitTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PartyGamesUnitTests
    dependencies:
      - target: PartyGames
    settings:
      base:
        INFOPLIST_FILE: PartyGamesUnitTests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.partygames.unittests
        DEVELOPMENT_TEAM: ""

  PartyGamesUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: PartyGamesUITests
    dependencies:
      - target: PartyGames
    settings:
      base:
        INFOPLIST_FILE: PartyGamesUITests/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.partygames.uitests
        DEVELOPMENT_TEAM: ""
